default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.(yml|yaml)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^\.github/scripts/.*\.py$
      - id: ruff-format
        files: ^\.github/scripts/.*\.py$

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-java
        args: [--autofix]
        files: (^|/)src/.*\.java$

  - repo: local
    hooks:
      - id: check-pom-consistency
        name: Check POM/dependabot consistency
        language: python
        language_version: python3
        additional_dependencies: [defusedxml]
        entry: python3 .github/scripts/check-pom-consistency.py
        files: ^pom\.xml$|^\.github/dependabot\.yml$
        pass_filenames: false

      - id: poutine
        name: Analyze workflows (Poutine)
        language: system
        entry: poutine
        args: [analyze_local, ., --format, pretty]
        files: ^\.github/workflows/.*\.(yml|yaml)$
        pass_filenames: false

      - id: unit-tests
        name: Unit tests
        language: system
        entry: ./mvnw
        args: [-B, -ntp, -P!integration-tests, test]
        files: (^|/)src/|pom\.xml$
        pass_filenames: false

      - id: integration-tests
        name: Integration tests
        language: system
        entry: ./mvnw
        # -DskipTests skips surefire unit tests (already run at pre-commit stage)
        args: [-B, -ntp, -DskipTests, -Pintegration-tests, verify]
        files: (^|/)src/|pom\.xml$
        pass_filenames: false
        stages: [pre-push]
