name: Native Binaries

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  native:
    uses: ./.github/workflows/native-build-reusable.yml
    permissions:
      contents: read
    with:
      publish-release: false
      artifact-retention-days: 7
