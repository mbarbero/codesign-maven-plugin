name: Native Build Reusable

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: Artifact retention in days
        required: false
        type: number
        default: 7

permissions: {}

jobs:
  native:
    name: Build native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            jreleaser-platform: linux-x86_64
            binary: codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            jreleaser-platform: linux-aarch_64
            binary: codesign
          - os: macos-latest
            platform: macos-aarch64
            jreleaser-platform: osx-aarch_64
            binary: codesign
          - os: macos-15-intel
            platform: macos-x86_64
            jreleaser-platform: osx-x86_64
            binary: codesign
          - os: windows-latest
            platform: windows-x86_64
            jreleaser-platform: windows-x86_64
            binary: codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1 # v1.4.5
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Upload native binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codesign-${{ matrix.jreleaser-platform }}
          path: cli/target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
