name: Native Build Reusable

on:
  workflow_call:
    inputs:
      publish-release:
        description: Upload binaries to a GitHub release instead of artifacts
        required: true
        type: boolean
      tag-name:
        description: Release tag name (required when publish-release is true)
        required: false
        type: string
        default: ""
      artifact-retention-days:
        description: Artifact retention in days for non-release uploads
        required: false
        type: number
        default: 7
jobs:
  native:
    name: Build native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            binary: codesign
          - os: macos-latest
            platform: macos-aarch64
            binary: codesign
          - os: macos-15-intel
            platform: macos-x86_64
            binary: codesign
          - os: windows-latest
            platform: windows-x86_64
            binary: codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1 # v1.4.5
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Rename binary for release asset
        id: rename
        if: ${{ inputs.publish-release }}
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          src="cli/target/${MATRIX_BINARY}"
          dst="codesign-${MATRIX_PLATFORM}"
          if [[ "${MATRIX_PLATFORM}" == "windows-x86_64" ]]; then
            dst="${dst}.exe"
          fi
          cp "$src" "$dst"
          echo "asset=${dst}" >> "$GITHUB_OUTPUT"

      - name: Upload binary to GitHub release
        if: ${{ inputs.publish-release }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag-name }}
          ASSET_NAME: ${{ steps.rename.outputs.asset }}
        shell: bash
        run: gh release upload "${TAG_NAME}" "${ASSET_NAME}" --clobber

      - name: Upload native binary artifact
        if: ${{ !inputs.publish-release }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codesign-${{ matrix.platform }}
          path: cli/target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
