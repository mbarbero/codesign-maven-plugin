name: reviewdog

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  reviewdog-actionlint:
    name: reviewdog (actionlint)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: actionlint with reviewdog
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: error
          level: warning

  reviewdog-ruff:
    name: reviewdog (ruff)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0

      - name: Install Ruff
        run: pip install ruff

      - name: ruff with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check .github/scripts --output-format=rdjson \
            | reviewdog -f=rdjson -name="ruff" -reporter=github-pr-review -filter-mode=added -fail-level=error

  reviewdog-pre-commit:
    name: reviewdog (pre-commit)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        id: precommit
        continue-on-error: true
        env:
          # poutine requires a system binary not available on ubuntu-latest;
          # it has a dedicated job in ci-guardrails.yml.
          # unit-tests runs Maven and is covered by the ci.yml workflow.
          # actionlint/ruff/ruff-format have dedicated reviewdog jobs above.
          # zizmor has a dedicated job in ci-guardrails.yml (with SARIF upload).
          # check-pom-consistency has a dedicated job in ci-guardrails.yml.
          # markdownlint has a dedicated reviewdog job above.
          SKIP: poutine,unit-tests,actionlint,ruff,ruff-format,zizmor,check-pom-consistency,markdownlint
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Suggest fixes with reviewdog
        if: ${{ always() }}
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1.24.0
        with:
          tool_name: pre-commit
          fail_on_error: "false"

      - name: Fail if pre-commit found issues
        if: ${{ steps.precommit.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::error::Pre-commit checks failed. Run locally: prek run --all-files"
          exit 1

  reviewdog-markdownlint:
    name: reviewdog (markdownlint)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: markdownlint with reviewdog
        uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58 # v0.26.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_level: error
          level: warning
