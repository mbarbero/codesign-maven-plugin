name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Load pinned tool versions
        id: versions
        run: |
          cyclonedx_cli="$(jq -r '.cyclonedx_cli' .github/tools/versions.json)"
          echo "cyclonedx_cli=${cyclonedx_cli}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up cdxgen
        run: |
          npm install --prefix .github/tools --no-fund --no-audit
          echo "${GITHUB_WORKSPACE}/.github/tools/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Set up CycloneDX CLI
        env:
          GH_TOKEN: ${{ github.token }}
          CYCLONEDX_CLI_VERSION: ${{ steps.versions.outputs.cyclonedx_cli }}
        run: |
          set -euo pipefail
          repo="CycloneDX/cyclonedx-cli"
          asset_name="cyclonedx-linux-x64"

          digest="$(
            gh api "repos/${repo}/releases/tags/${CYCLONEDX_CLI_VERSION}" \
              --jq ".assets[] | select(.name == \"${asset_name}\") | .digest"
          )"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "::error::Could not locate digest for ${asset_name} in ${repo} ${CYCLONEDX_CLI_VERSION}"
            exit 1
          fi
          case "${digest}" in
            sha256:*) expected_sha="${digest#sha256:}" ;;
            *)
              echo "::error::Unsupported digest format: ${digest}"
              exit 1
              ;;
          esac

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          gh release download "${CYCLONEDX_CLI_VERSION}" --repo "${repo}" --pattern "${asset_name}" --output "${tmpdir}/${asset_name}"

          actual_sha="$(sha256sum "${tmpdir}/${asset_name}" | awk '{print tolower($1)}')"
          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Checksum verification failed for ${asset_name}"
            echo "Expected: ${expected_sha}"
            echo "Actual:   ${actual_sha}"
            exit 1
          fi

          install -m 0755 "${tmpdir}/${asset_name}" /usr/local/bin/cyclonedx
          chmod +x /usr/local/bin/cyclonedx

      - name: Build and run tests
        run: ./mvnw -B -ntp -P integration-tests,generate-sbom verify

      - name: Show WireMock log on failure
        if: failure()
        run: cat maven-plugin/target/wiremock.log 2>/dev/null || echo "(WireMock log not found)"
