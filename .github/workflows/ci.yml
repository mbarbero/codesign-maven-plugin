name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Set up CycloneDX CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh release view --repo CycloneDX/cyclonedx-cli --json tagName --jq .tagName)
          curl -fsSL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/${version}/cyclonedx-linux-x64" \
            -o /usr/local/bin/cyclonedx
          chmod +x /usr/local/bin/cyclonedx

      - name: Build and run tests
        run: ./mvnw -B -ntp -P integration-tests,generate-sbom verify

      - name: Show WireMock log on failure
        if: failure()
        run: cat codesign-maven-plugin/target/wiremock.log 2>/dev/null || echo "(WireMock log not found)"
