name: Native Binaries

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  native:
    uses: ./.github/workflows/reusable-native-build.yml
    with:
      artifact-retention-days: 7
