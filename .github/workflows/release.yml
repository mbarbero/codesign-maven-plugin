name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode (dry-run validates release flow without publishing)
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release
    env:
      CYCLONEDX_CLI_VERSION: v0.29.2

    permissions:
      contents: write # needed to create GitHub release and upload artifacts
      id-token: write # needed for OIDC-based Sigstore keyless signing and SLSA attestation
      attestations: write # needed to create SLSA build provenance attestations

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up cdxgen
        run: |
          npm install --prefix .github/tools --no-fund --no-audit
          echo "${GITHUB_WORKSPACE}/.github/tools/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Set up CycloneDX CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="CycloneDX/cyclonedx-cli"
          asset_name="cyclonedx-linux-x64"

          digest="$(
            gh api "repos/${repo}/releases/tags/${CYCLONEDX_CLI_VERSION}" \
              --jq ".assets[] | select(.name == \"${asset_name}\") | .digest"
          )"
          if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
            echo "::error::Could not locate digest for ${asset_name} in ${repo} ${CYCLONEDX_CLI_VERSION}"
            exit 1
          fi
          case "${digest}" in
            sha256:*) expected_sha="${digest#sha256:}" ;;
            *)
              echo "::error::Unsupported digest format: ${digest}"
              exit 1
              ;;
          esac

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          gh release download "${CYCLONEDX_CLI_VERSION}" --repo "${repo}" --pattern "${asset_name}" --output "${tmpdir}/${asset_name}"

          actual_sha="$(sha256sum "${tmpdir}/${asset_name}" | awk '{print tolower($1)}')"
          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Checksum verification failed for ${asset_name}"
            echo "Expected: ${expected_sha}"
            echo "Actual:   ${actual_sha}"
            exit 1
          fi

          install -m 0755 "${tmpdir}/${asset_name}" /usr/local/bin/cyclonedx
          chmod +x /usr/local/bin/cyclonedx

      - name: Validate publish dispatch is run on a tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'publish' && !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "::error::Publish mode requires a tag ref (refs/tags/v*). Dispatch this workflow from the release tag."
          exit 1

      - name: Build release artifacts (publish mode)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')) }}
        run: ./mvnw -B -ntp -P integration-tests,generate-sbom,release -Dsigstore.skip=false clean deploy

      - name: Build release artifacts (dry-run mode)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
        run: ./mvnw -B -ntp -P integration-tests,generate-sbom,release -Dsigstore.skip=false clean verify

      - name: Run JReleaser
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run') || (startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish'))) }}
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_NEXUS2_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_NEXUS2_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'publish' }}
        run: |
          extra_args=()
          if [ "$MODE" = "dry-run" ]; then
            extra_args+=("-Djreleaser.dry.run=true")
          fi
          ./mvnw -B -ntp -DskipTests jreleaser:full-release "${extra_args[@]}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')) }}
        with:
          subject-path: |
            api/target/staging-deploy/**/*.jar
            api/target/staging-deploy/**/*.pom
            maven-plugin/target/staging-deploy/**/*.jar
            maven-plugin/target/staging-deploy/**/*.pom
            cli/target/staging-deploy/**/*.jar
            cli/target/staging-deploy/**/*.pom

  native-binaries:
    name: Native binary (${{ matrix.platform }})
    needs: release
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            binary: codesign
          - os: macos-latest
            platform: macos-aarch64
            binary: codesign
          - os: macos-13
            platform: macos-x86_64
            binary: codesign
          - os: windows-latest
            platform: windows-x86_64
            binary: codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    environment: release

    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1 # v1.4.5
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Rename binary for release asset
        id: rename
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          src="cli/target/${MATRIX_BINARY}"
          dst="codesign-${MATRIX_PLATFORM}"
          if [[ "${MATRIX_PLATFORM}" == "windows-x86_64" ]]; then
            dst="${dst}.exe"
          fi
          cp "$src" "$dst"
          echo "asset=${dst}" >> "$GITHUB_OUTPUT"

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_NAME: ${{ steps.rename.outputs.asset }}
        shell: bash
        run: gh release upload "${TAG_NAME}" "${ASSET_NAME}" --clobber
