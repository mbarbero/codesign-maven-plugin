name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run JReleaser in dry-run mode
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release

    permissions:
      contents: write # needed to create GitHub release and upload artifacts
      id-token: write # needed for OIDC-based Sigstore keyless signing and SLSA attestation
      attestations: write # needed to create SLSA build provenance attestations

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up cdxgen
        run: npm install -g @cyclonedx/cdxgen

      - name: Set up CycloneDX CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh release view --repo CycloneDX/cyclonedx-cli --json tagName --jq .tagName)
          curl -fsSL "https://github.com/CycloneDX/cyclonedx-cli/releases/download/${version}/cyclonedx-linux-x64" \
            -o /usr/local/bin/cyclonedx
          chmod +x /usr/local/bin/cyclonedx

      - name: Build release artifacts
        run: ./mvnw -B -ntp -P integration-tests,generate-sbom,release -Dsigstore.skip=false clean verify

      - name: Run JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          extra_args=()
          if [ "$DRY_RUN" = "true" ]; then
            extra_args+=("-Djreleaser.dry.run=true")
          fi
          ./mvnw -B -ntp -DskipTests jreleaser:full-release "${extra_args[@]}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        if: ${{ !inputs.dry-run }}
        with:
          subject-path: |
            codesign-api/target/staging-deploy/**/*.jar
            codesign-api/target/staging-deploy/**/*.pom
            codesign-maven-plugin/target/staging-deploy/**/*.jar
            codesign-maven-plugin/target/staging-deploy/**/*.pom
            cli/target/staging-deploy/**/*.jar
            cli/target/staging-deploy/**/*.pom

  native-binaries:
    name: Native binary (${{ matrix.platform }})
    needs: release
    if: ${{ !inputs.dry-run }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary: codesign
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            binary: codesign
          - os: macos-latest
            platform: macos-aarch64
            binary: codesign
          - os: macos-13
            platform: macos-x86_64
            binary: codesign
          - os: windows-latest
            platform: windows-x86_64
            binary: codesign.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    environment: release

    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1 # v1.4.5
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Build native binary
        shell: bash
        run: ./mvnw -B -ntp -Pnative -pl cli --also-make -DskipTests package

      - name: Rename binary for release asset
        id: rename
        env:
          MATRIX_BINARY: ${{ matrix.binary }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          src="cli/target/${MATRIX_BINARY}"
          dst="codesign-${MATRIX_PLATFORM}"
          if [[ "${MATRIX_PLATFORM}" == "windows-x86_64" ]]; then
            dst="${dst}.exe"
          fi
          cp "$src" "$dst"
          echo "asset=${dst}" >> "$GITHUB_OUTPUT"

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_NAME: ${{ steps.rename.outputs.asset }}
        shell: bash
        run: gh release upload "${TAG_NAME}" "${ASSET_NAME}" --clobber
