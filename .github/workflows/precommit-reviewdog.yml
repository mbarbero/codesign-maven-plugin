name: pre-commit (reviewdog)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  reviewdog:
    name: pre-commit (reviewdog)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.6.0
        with:
          python-version: "3.12"

      - name: Install pre-commit runner
        run: pip install prek

      - name: Run pre-commit
        id: precommit
        shell: bash
        run: |
          set +e
          prek run --all-files --show-diff-on-failure
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          set -e

      - name: Suggest fixes with reviewdog
        if: ${{ always() }}
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1.24.0
        with:
          tool_name: pre-commit
          fail_on_error: "false"

      - name: Fail if pre-commit found issues
        if: ${{ steps.precommit.outputs.exit_code != '0' }}
        shell: bash
        run: |
          echo "::error::Pre-commit checks failed. Run locally: prek run --all-files"
          exit 1
