name: pre-commit (reviewdog)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  reviewdog:
    name: pre-commit (reviewdog)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Required to post review comments

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Run pre-commit (action)
        id: precommit
        continue-on-error: true
        uses: j178/prek-action@0bb87d7f00b0c99306c8bcb8b8beba1eb581c037 # v1.1.1
        with:
          extra-args: --all-files --show-diff-on-failure

      - name: Suggest fixes with reviewdog
        if: ${{ always() }}
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1.24.0
        with:
          tool_name: pre-commit
          fail_on_error: "false"

      - name: Fail if pre-commit found issues
        if: ${{ steps.precommit.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::error::Pre-commit checks failed. Run locally: prek run --all-files"
          exit 1
