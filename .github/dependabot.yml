version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: build
      include: scope
    groups:
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
          - "org.jacoco:*"
          - "org.jreleaser:*"
          - "org.cyclonedx:*"
          - "org.graalvm.buildtools:*"
          - "dev.sigstore:*"
          - "org.asciidoctor:*"
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/.github/requirements"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      python-workflow-tools:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/.github/tools"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: ci
      include: scope
    groups:
      node-workflow-tools:
        patterns:
          - "*"
